name: Renderizar Vídeo Remotion

on:
  workflow_dispatch:
    inputs:
      composition:
        description: 'ID da Composição (ex: ProjetoAlpha)'
        required: true
        default: 'ProjetoAlpha'
        type: string

jobs:
  render:
    name: Renderizar e Exportar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências do sistema (Chromium & friends)
        # O Ubuntu 24.04 mudou nomes de vários pacotes (ex: libasound2 -> libasound2t64).
        # Usamos coringas ou os nomes novos para garantir que funcione no 'ubuntu-latest'.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2t64 || sudo apt-get install -y libasound2 \
            libpango-1.0-0 \
            libcairo2 \
            fonts-liberation \
            xdg-utils \
            wget \
            libvulkan1

      - name: Instalar dependências do projeto
        run: npm ci

      - name: Renderizar vídeo
        # Forçamos o modo headless e desativamos o sandbox que costuma dar dor de cabeça no CI
        run: |
          npx remotion render \
            src/index.tsx \
            ${{ github.event.inputs.composition }} \
            out/video.mp4 \
            --gl=swiftshader \
            --browser-flags="--no-sandbox --disable-setuid-sandbox" \
            --log=verbose

      - name: Disponibilizar o vídeo para download
        uses: actions/upload-artifact@v4
        with:
          name: video-renderizado-${{ github.event.inputs.composition }}
          path: out/video.mp4
          retention-days: 7